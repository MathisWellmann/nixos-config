apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bencher-api
  namespace: argocd
spec:
  destination:
    namespace: bencher-api
    server: https://kubernetes.default.svc
  project: default
  source:
    path: ./manifests/prod/bencher-api
    repoURL: https://github.com/MathisWellmann/nixos-config.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
