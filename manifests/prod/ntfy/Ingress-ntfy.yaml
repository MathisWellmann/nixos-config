apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: k3s-lan-ca
    gethomepage.dev/description: Push notifications
    gethomepage.dev/enabled: "true"
    gethomepage.dev/external: "true"
    gethomepage.dev/group: Utilities
    gethomepage.dev/icon: ntfy.svg
    gethomepage.dev/name: ntfy
    gethomepage.dev/siteMonitor: http://ntfy.ntfy.svc.cluster.local
  name: ntfy
  namespace: ntfy
spec:
  ingressClassName: traefik
  rules:
    - host: ntfy.k3s.lan
      http:
        paths:
          - backend:
              service:
                name: ntfy
                port:
                  number: 80
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - ntfy.k3s.lan
      secretName: ntfy-tls
