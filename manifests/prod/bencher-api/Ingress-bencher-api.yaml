apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: k3s-lan-ca
    gethomepage.dev/description: Bencher API
    gethomepage.dev/enabled: "true"
    gethomepage.dev/external: "true"
    gethomepage.dev/group: DevOps
    gethomepage.dev/icon: mdi-api
    gethomepage.dev/name: bencher-api
    gethomepage.dev/siteMonitor: http://bencher-api.bencher-api.svc.cluster.local
  name: bencher-api
  namespace: bencher-api
spec:
  ingressClassName: traefik
  rules:
    - host: bencher-api.k3s.lan
      http:
        paths:
          - backend:
              service:
                name: bencher-api
                port:
                  number: 80
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - bencher-api.k3s.lan
      secretName: bencher-api-tls
